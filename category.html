<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Tools Category</title>

<meta name="description" content="Browse AI tools by category including AI writing tools, AI image generators, AI video tools and more.">

<link rel="stylesheet" href="/assets/css/style.css">

</head>

<body>

<header>

<h2>AI Tools Directory</h2>

<nav>
<a href="/">Home</a>
<a href="/tools/">Tools</a>
<a href="/categories/">Categories</a>
</nav>

</header>

<main>

<section class="page-header">

<h1 id="categoryTitle">AI Tools</h1>

<p>
Explore the best tools in this AI category.
</p>

</section>

<section class="tools-section">

<div id="tools-container" class="tools-grid">

<!-- tools will load here -->

</div>

</section>

</main>

<footer>

<p>© 2026 AI Tools Directory</p>

</footer>

<script>

async function loadCategoryTools(){

const params = new URLSearchParams(window.location.search)

const category = params.get("cat")

if(!category){

document.getElementById("categoryTitle").innerText = "AI Tools"

return

}

document.getElementById("categoryTitle").innerText = category + " Tools"


const res = await fetch("/data/tools.json")

const tools = await res.json()


const filtered = tools.filter(t => t.category === category)

const container = document.getElementById("tools-container")


filtered.forEach(tool => {

const card = document.createElement("div")

card.className = "tool-card"

card.innerHTML = `

<img src="${tool.logo}" width="40">

<h3>${tool.name}</h3>

<p>${tool.description}</p>

<div class="category">${tool.category}</div>

<a class="btn" href="/tools/tool.html?tool=${tool.slug}">
View Tool
</a>

`

container.appendChild(card)

})

}

loadCategoryTools()

</script>

</body>
</html>
