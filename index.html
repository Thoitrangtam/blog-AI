<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Best AI Tools Directory | Discover 100+ AI Tools</title>

<meta name="description" content="Discover the best AI tools for productivity, writing, design, coding and business. Browse our AI tools directory with hundreds of tools.">

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial, sans-serif;
background:#f4f6fb;
margin:0;
}

header{
background:white;
padding:20px 40px;
box-shadow:0 2px 5px rgba(0,0,0,0.05);
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
margin:0;
}

nav a{
margin-left:20px;
text-decoration:none;
color:#333;
font-weight:600;
}

.hero{
padding:60px 40px;
text-align:center;
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.hero p{
color:#666;
}

#search{
margin-top:20px;
padding:12px;
width:300px;
border-radius:6px;
border:1px solid #ddd;
}

.section{
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.card h3{
margin-top:0;
}

.card a{
display:inline-block;
margin-top:10px;
background:#4f46e5;
color:white;
padding:8px 14px;
border-radius:6px;
text-decoration:none;
}

footer{
text-align:center;
padding:40px;
color:#777;
}

</style>

</head>

<body>

<header>

<h2>AI Tools Directory</h2>

<nav>

<a href="/">Home</a>
<a href="/tools">Tools</a>
<a href="/categories">Categories</a>
<a href="/comparisons">Comparisons</a>
<a href="/blog">Blog</a>

</nav>

</header>

<section class="hero">

<h1>Discover the Best AI Tools</h1>

<p>Browse hundreds of AI tools for productivity, design, writing and automation.</p>

<input id="search" placeholder="Search AI tools...">

</section>

<section class="section">

<h2>Popular AI Tools</h2>

<div class="grid" id="tools"></div>

</section>

<footer>

<p>© 2026 AI Tools Directory</p>

</footer>

<script>

let toolsData=[]

async function loadTools(){

const res = await fetch("/data/tools.json")
toolsData = await res.json()

renderTools(toolsData.slice(0,12))

}

function renderTools(list){

const container=document.getElementById("tools")
container.innerHTML=""

list.forEach(tool=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<h3>${tool.name}</h3>

<p>${tool.description}</p>

<a href="/tools/tool.html?tool=${tool.slug}">View Tool</a>

`

container.appendChild(card)

})

}

document.getElementById("search").addEventListener("input",function(){

const keyword=this.value.toLowerCase()

const filtered=toolsData.filter(t=>

t.name.toLowerCase().includes(keyword) ||
t.category.toLowerCase().includes(keyword)

)

renderTools(filtered.slice(0,12))

})

loadTools()

</script>

</body>

</html>
