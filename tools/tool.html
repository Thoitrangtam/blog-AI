<!DOCTYPE html>
<html>

<head>

<title>AI Tool</title>

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="tool-page">

<img id="logo">

<h1 id="name"></h1>

<p id="desc"></p>

<div id="rating"></div>

<a id="visit" target="_blank" class="visit-btn">Visit Tool</a>

</div>

<script>

async function loadTool(){

const params = new URLSearchParams(location.search)

const slug = params.get("tool")

const res = await fetch("/data/tools.json")

const tools = await res.json()

const tool = tools.find(t=>t.slug===slug)

document.getElementById("logo").src = tool.logo
document.getElementById("name").innerText = tool.name
document.getElementById("desc").innerText = tool.description
document.getElementById("rating").innerText = "⭐ "+tool.rating
document.getElementById("visit").href = tool.affiliate

}

loadTool()

</script>

</body>

</html>
